        font-weight="900" font-size="24" fill="oklch(22% 0.01 280)" letter-spacing="1">2CY</text>
  <!-- 朱红闪光漫符：品牌色点睛 -->
  <path d="M101 24 l2.5 6 6 2.5 -6 2.5 -2.5 6 -2.5 -6 -6 -2.5 6 -2.5 Z" fill="oklch(52% 0.185 30)"/>
</svg>
